<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Farm To Home deployment-ready static entry page." />
  <title>Farm To Home</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <img src="./images/hero.svg" alt="Farm illustration" class="hero-image" />

      <p>Fresh produce, direct from farmers to your doorstep.</p>
      <a class="cta" href="./app">Open App</a>

      <section class="card">

        <p>

      </section>
    </main>

    <footer class="footer">
      <small>&copy; 2026 Farm To Home</small>
    </footer>
  </div>

  <script src="./script.js"></script>

</html>
